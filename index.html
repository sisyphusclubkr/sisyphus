<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORE 3 - 완벽한 습관 인증</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; color: #0f172a; }
        ::-webkit-scrollbar { display: none; }
        @keyframes scan {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .scanner-line {
            position: absolute; left: 0; width: 100%; height: 3px; 
            background: #10b981; box-shadow: 0 0 10px #10b981;
            animation: scan 1.5s infinite linear;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Icons
        const FlameIcon = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"></path></svg>;
        const EditIcon = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;
        const SaveIcon = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>;
        const CameraIcon = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path><circle cx="12" cy="13" r="3"></circle></svg>;
        const CheckIcon = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>;
        const LockIcon = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;

        const defaultHabits = [
            { id: 'earn', category: '돈벌기', when: '09:00', where: '책상 앞', what: '부업 아이디어', howMuch: '1개 구상', streak: 0, isDone: false, isEditing: false, refImage: null, dailyImage: null, isVerifying: false, theme: 'from-emerald-400 to-teal-600', badge: 'bg-emerald-100 text-emerald-700' },
            { id: 'save', category: '돈모으기', when: '21:00', where: '침대 위', what: '무지출 챌린지 가계부', howMuch: '1회 작성', streak: 0, isDone: false, isEditing: false, refImage: null, dailyImage: null, isVerifying: false, theme: 'from-blue-400 to-indigo-600', badge: 'bg-blue-100 text-blue-700' },
            { id: 'happy', category: '행복', when: '07:30', where: '거실 매트', what: '나를 위한 명상', howMuch: '10분 진행', streak: 0, isDone: false, isEditing: false, refImage: null, dailyImage: null, isVerifying: false, theme: 'from-rose-400 to-pink-600', badge: 'bg-rose-100 text-rose-700' }
        ];

        const HabitApp = () => {
            const [now, setNow] = useState(new Date());
            
            // 데이터 로드
            const [habits, setHabits] = useState(() => {
                const saved = localStorage.getItem('core3_ultimate_v1');
                if (saved) {
                    return JSON.parse(saved).map(h => ({ ...h, isEditing: false, isVerifying: false }));
                }
                return defaultHabits;
            });

            // 매초 시계 업데이트 및 자정 초기화 엔진
            useEffect(() => {
                const timer = setInterval(() => {
                    const currentTime = new Date();
                    setNow(currentTime);

                    const todayStr = currentTime.toDateString();
                    const lastSavedDateStr = localStorage.getItem('core3_ultimate_date');

                    if (lastSavedDateStr && lastSavedDateStr !== todayStr) {
                        setHabits(prevHabits => prevHabits.map(h => {
                            let newStreak = h.streak;
                            // 실천 안 했거나 하루 넘게 접속 안 했으면 연속일수 리셋
                            if (!h.isDone) newStreak = 0;
                            else {
                                const diffDays = Math.floor(Math.abs(currentTime - new Date(lastSavedDateStr)) / (1000 * 60 * 60 * 24));
                                if (diffDays > 1) newStreak = 0;
                            }
                            // 다음 날이 되었으므로 당일 인증사진과 성공여부 초기화 (예시사진은 유지)
                            return { ...h, isDone: false, streak: newStreak, dailyImage: null, isVerifying: false };
                        }));
                        localStorage.setItem('core3_ultimate_date', todayStr);
                    } else if (!lastSavedDateStr) {
                        localStorage.setItem('core3_ultimate_date', todayStr);
                    }
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            // 데이터 자동 저장
            useEffect(() => {
                localStorage.setItem('core3_ultimate_v1', JSON.stringify(habits));
            }, [habits]);

            const toggleEdit = (id) => {
                setHabits(habits.map(h => h.id === id ? { ...h, isEditing: !h.isEditing } : h));
            };

            const updateField = (id, field, value) => {
                setHabits(habits.map(h => h.id === id ? { ...h, [field]: value } : h));
            };

            // 이미지 업로드 및 AI 유사도 분석 시뮬레이션
            const handleImageUpload = (e, id, type) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onloadend = () => {
                    const base64String = reader.result;
                    setHabits(prev => prev.map(h => {
                        if (h.id === id) {
                            if (type === 'ref') return { ...h, refImage: base64String };
                            if (type === 'daily') {
                                // 당일 사진을 찍으면 AI 분석 시작 (2.5초 대기)
                                setTimeout(() => finishVerification(id), 2500);
                                return { ...h, dailyImage: base64String, isVerifying: true };
                            }
                        }
                        return h;
                    }));
                };
                reader.readAsDataURL(file);
            };

            // 가짜 AI 검증 완료 로직
            const finishVerification = (id) => {
                setHabits(prev => prev.map(h => {
                    if (h.id === id && h.isVerifying) {
                        // 유사도 90% 이상으로 통과했다고 가정
                        return { ...h, isVerifying: false, isDone: true, streak: h.streak + 1 };
                    }
                    return h;
                }));
            };

            return (
                <div className="max-w-md mx-auto p-5 min-h-screen pb-20">
                    <header className="mb-8 pt-6">
                        <div className="text-center mb-6">
                            <p className="text-slate-400 font-bold text-xs tracking-widest uppercase mb-1">Current Time</p>
                            <div className="inline-block bg-white text-slate-800 border border-slate-200 px-6 py-2 rounded-full text-2xl font-black font-mono tracking-widest shadow-sm">
                                {now.toLocaleTimeString('ko-KR', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' })}
                            </div>
                        </div>

                        <div className="flex justify-between items-end px-2">
                            <div>
                                <h1 className="text-4xl font-black tracking-tighter text-slate-900 leading-none">CORE 3</h1>
                                <p className="text-slate-500 font-bold mt-2 text-sm">계획하고, 찍고, 증명하라.</p>
                            </div>
                            <div className="bg-white px-4 py-2 rounded-2xl shadow-sm border border-slate-200 text-center">
                                <p className="text-[10px] font-black text-slate-400 leading-none mb-1">TOTAL STREAK</p>
                                <p className="text-2xl font-black text-indigo-600 leading-none">{habits.reduce((acc, curr) => acc + curr.streak, 0)}</p>
                            </div>
                        </div>
                    </header>

                    <div className="space-y-6">
                        {habits.map((habit) => {
                            // 필수 설정(육하원칙 텍스트 + 예시사진)이 모두 완료되었는지 체크
                            const isSetupComplete = habit.when && habit.where && habit.what && habit.howMuch && habit.refImage;

                            return (
                                <div key={habit.id} className={`relative overflow-hidden bg-white rounded-[28px] transition-all duration-300 shadow-xl border border-slate-100 ${habit.isDone ? 'scale-[0.98] opacity-80' : 'scale-100'}`}>
                                    {/* 상단 컬러 바 */}
                                    <div className={`absolute top-0 left-0 w-full h-2 bg-gradient-to-r ${habit.theme}`} />
                                    
                                    <div className="p-6 pt-7">
                                        <div className="flex justify-between items-start mb-4">
                                            <div>
                                                <span className={`text-[11px] font-black tracking-widest uppercase px-2.5 py-1 rounded-md ${habit.badge}`}>{habit.category}</span>
                                                <div className="flex items-center gap-1 mt-2 text-orange-500">
                                                    <FlameIcon />
                                                    <span className="text-sm font-black">{habit.streak}일 연속 성공</span>
                                                </div>
                                            </div>
                                            <button onClick={() => toggleEdit(habit.id)} className="p-2.5 bg-slate-50 rounded-xl border border-slate-200 text-slate-500 hover:text-slate-800 transition-all z-10">
                                                {habit.isEditing ? <SaveIcon /> : <EditIcon />}
                                            </button>
                                        </div>

                                        {/* 육하원칙 문장 & 폼 */}
                                        {habit.isEditing ? (
                                            <div className="space-y-3 bg-slate-50 p-4 rounded-2xl border border-slate-200">
                                                <div className="flex items-center gap-3">
                                                    <input type="time" value={habit.when} onChange={(e) => updateField(habit.id, 'when', e.target.value)} className="bg-white rounded-lg px-3 py-2 text-sm font-bold border border-slate-200 outline-none" />
                                                    <span className="text-sm font-bold text-slate-600">에</span>
                                                </div>
                                                <div className="flex items-center gap-3">
                                                    <input type="text" value={habit.where} onChange={(e) => updateField(habit.id, 'where', e.target.value)} placeholder="어디서" className="flex-1 bg-white rounded-lg px-3 py-2 text-sm font-bold border border-slate-200 outline-none" />
                                                    <span className="text-sm font-bold text-slate-600">에서</span>
                                                </div>
                                                <div className="flex items-center gap-3">
                                                    <input type="text" value={habit.what} onChange={(e) => updateField(habit.id, 'what', e.target.value)} placeholder="무엇을" className="flex-1 bg-white rounded-lg px-3 py-2 text-sm font-bold border border-slate-200 outline-none" />
                                                    <span className="text-sm font-bold text-slate-600">을(를)</span>
                                                </div>
                                                <div className="flex items-center gap-3">
                                                    <input type="text" value={habit.howMuch} onChange={(e) => updateField(habit.id, 'howMuch', e.target.value)} placeholder="얼만큼" className="flex-1 bg-white rounded-lg px-3 py-2 text-sm font-bold border border-slate-200 outline-none" />
                                                    <span className="text-sm font-bold text-slate-600">할 것이다.</span>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className={`mt-2 transition-all ${habit.isDone ? 'text-slate-500' : 'text-slate-800'}`}>
                                                <p className="text-sm font-bold text-slate-500 mb-1">
                                                    <span className="bg-slate-100 px-2 py-0.5 rounded mr-1">{habit.when || '?'}</span>에 
                                                    <span className="underline decoration-slate-300 underline-offset-4 mx-1">{habit.where || '?'}</span>에서
                                                </p>
                                                <h2 className="text-[22px] font-black leading-tight break-keep">
                                                    {habit.what || '?'}을(를) <br/>
                                                    <span className="underline decoration-2 underline-offset-4">{habit.howMuch || '?'}</span> 할 것이다.
                                                </h2>
                                            </div>
                                        )}

                                        {/* 사진 등록 및 비교 영역 */}
                                        <div className="mt-6 grid grid-cols-2 gap-3">
                                            {/* 기준 예시 사진 */}
                                            <div className="relative aspect-square rounded-2xl border-2 border-dashed border-slate-300 bg-slate-50 overflow-hidden flex flex-col items-center justify-center group">
                                                {habit.refImage ? (
                                                    <img src={habit.refImage} className="w-full h-full object-cover" alt="기준" />
                                                ) : (
                                                    <span className="text-xs font-bold text-slate-400 text-center px-2">예시 사진이<br/>필요합니다</span>
                                                )}
                                                {/* 수정 모드일 때만 예시 사진 업로드 가능 */}
                                                {habit.isEditing && (
                                                    <label className="absolute inset-0 bg-black/50 flex flex-col items-center justify-center cursor-pointer text-white opacity-0 group-hover:opacity-100 transition-opacity">
                                                        <CameraIcon />
                                                        <span className="text-[10px] font-bold mt-1">예시 등록</span>
                                                        <input type="file" accept="image/*" className="hidden" onChange={(e) => handleImageUpload(e, habit.id, 'ref')} />
                                                    </label>
                                                )}
                                                <div className="absolute top-2 left-2 bg-slate-800/80 px-2 py-0.5 rounded text-[10px] font-bold text-white backdrop-blur-sm">기준 사진</div>
                                            </div>

                                            {/* 당일 인증 사진 */}
                                            <div className="relative aspect-square rounded-2xl border-2 border-slate-200 bg-slate-100 overflow-hidden flex flex-col items-center justify-center">
                                                {habit.dailyImage ? (
                                                    <>
                                                        <img src={habit.dailyImage} className={`w-full h-full object-cover transition-all ${habit.isVerifying ? 'brightness-50' : ''}`} alt="오늘 인증" />
                                                        {habit.isVerifying && (
                                                            <>
                                                                <div className="scanner-line"></div>
                                                                <div className="absolute bg-black/70 text-emerald-400 px-3 py-1.5 rounded-lg text-xs font-black tracking-widest flex items-center gap-1 z-20">
                                                                    <div className="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
                                                                    AI 분석 중
                                                                </div>
                                                            </>
                                                        )}
                                                    </>
                                                ) : (
                                                    <div className="text-slate-300"><CameraIcon /></div>
                                                )}
                                                <div className="absolute top-2 left-2 bg-white/90 border border-slate-200 px-2 py-0.5 rounded text-[10px] font-bold text-slate-600 shadow-sm">오늘 인증</div>
                                            </div>
                                        </div>

                                        {/* 동적 실천 버튼 */}
                                        <div className="mt-5">
                                            {/* 1. 조건 미충족 (육하원칙 누락 or 예시사진 누락) */}
                                            {!isSetupComplete ? (
                                                <button disabled className="w-full flex items-center justify-center gap-2 py-4 rounded-xl font-black text-lg bg-slate-100 text-slate-400 cursor-not-allowed">
                                                    <LockIcon /> 설정 및 예시 등록 필요
                                                </button>
                                            ) : 
                                            /* 2. 성공 상태 */
                                            habit.isDone ? (
                                                <button disabled className="w-full flex items-center justify-center gap-2 py-4 rounded-xl font-black text-lg bg-slate-800 text-white shadow-lg">
                                                    <CheckIcon /> 유사도 94% 인증 성공!
                                                </button>
                                            ) : 
                                            /* 3. 사진 찍고 AI 검증 중인 상태 */
                                            habit.isVerifying ? (
                                                <button disabled className="w-full flex items-center justify-center gap-2 py-4 rounded-xl font-black text-lg bg-emerald-100 text-emerald-700 animate-pulse border border-emerald-200">
                                                    유사도 판별 중...
                                                </button>
                                            ) : 
                                            /* 4. 실천하기 (카메라 열기) 상태 */
                                            (
                                                <label htmlFor={`camera-${habit.id}`} className={`w-full flex items-center justify-center gap-2 py-4 rounded-xl font-black text-lg text-white cursor-pointer shadow-[0_4px_14px_0_rgba(0,0,0,0.1)] active:scale-95 transition-all bg-gradient-to-r ${habit.theme}`}>
                                                    <CameraIcon /> 실천하기 (사진 촬영)
                                                    {/* 숨겨진 파일 인풋: capture="environment" 로 스마트폰 후면 카메라 강제 실행 */}
                                                    <input 
                                                        type="file" 
                                                        accept="image/*" 
                                                        capture="environment" 
                                                        id={`camera-${habit.id}`} 
                                                        className="hidden" 
                                                        onChange={(e) => handleDailyImageUpload(e, habit.id, 'daily')} 
                                                    />
                                                </label>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );

            // 외부에서 버튼의 onChange를 호출하기 위한 래퍼 함수
            function handleDailyImageUpload(e, id, type) {
                handleImageUpload(e, id, type);
            }
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<HabitApp />);
    </script>
</body>
</html>
