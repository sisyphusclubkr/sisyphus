<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>시지프스 클럽 - 갓생챌린지 PRO</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/resemblejs/4.1.0/resemble.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #1a1a1a; --card-bg: #2d2d2d; --accent: #007bff; --success: #2ecc71; --warning: #f39c12; --text-color: #ffffff; --text-muted: #aaaaaa; --glass: rgba(255, 255, 255, 0.05); --font-family: 'Poppins', 'Noto Sans KR', sans-serif;
    }
    body { font-family: var(--font-family); background-color: var(--bg-color); margin: 0; padding: 20px; color: var(--text-color); }
    .container { max-width: 500px; margin: 0 auto; padding-bottom: 50px; }
    h1 { text-align: center; color: var(--text-color); margin-bottom: 20px; font-size: 26px; font-weight: 700; }
    h1 span { color: var(--accent); }
    
    .noti-btn { width: 100%; background: var(--glass); border: 2px solid var(--accent); color: var(--text-color); padding: 14px; border-radius: 12px; font-weight: 600; font-size: 15px; margin-bottom: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
    
    .habit-section { background: var(--card-bg); padding: 20px; border-radius: 20px; margin-bottom: 40px; border: 1px solid var(--glass); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2); }
    .habit-title { font-size: 19px; margin-top: 0; margin-bottom: 20px; text-align: center; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .habit-title i { color: var(--accent); font-size: 1.2em; }
    
    .card { background: var(--glass); padding: 18px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.03); margin-bottom: 18px; }
    .card h3 { margin-top: 0; font-size: 16px; color: var(--text-muted); margin-bottom: 15px; font-weight: 600; text-transform: uppercase; }
    
    .input-group { margin-bottom: 12px; display: flex; align-items: center; }
    .input-group label { width: 60px; font-weight: 600; color: var(--text-muted); font-size: 14px; }
    .input-group input { flex: 1; padding: 12px 14px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; color: var(--text-color); outline: none; font-size: 14px; font-family: inherit; }
    .input-group input:focus { border-color: var(--accent); }
    
    .photo-container { display: flex; gap: 12px; }
    .photo-box { flex: 1; border: 2px dashed rgba(255,255,255,0.1); padding: 20px 8px; text-align: center; border-radius: 15px; color: var(--text-muted); background-position: center; background-size: cover; background-repeat: no-repeat; min-height: 110px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; cursor: pointer; }
    .result-box { background-color: rgba(0,0,0,0.2); border-style: solid; border-color: rgba(255,255,255,0.05); cursor: default; }
    
    .action-btn { width: 100%; padding: 16px; font-size: 17px; font-weight: 700; border: none; border-radius: 12px; cursor: pointer; background-color: var(--accent); color: white; margin-top: 5px; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .action-btn:disabled { background-color: var(--glass); color: var(--text-muted); cursor: not-allowed; }
    .action-btn.success { background-color: var(--success); }
    
    input[type="file"] { display: none; }

    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); backdrop-filter: blur(8px); opacity: 0; transition: opacity 0.3s; }
    .modal-content { background-color: var(--card-bg); margin: 15% auto; padding: 25px; border-radius: 20px; border: 1px solid var(--glass); width: 90%; max-width: 400px; text-align: center; }
    .modal.show { display: block; opacity: 1; }
    .modal h2 { margin-top: 0; font-size: 20px; }
    .modal-result-data { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 15px; margin-top: 15px; margin-bottom: 20px; }
    .modal-result-line { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; font-weight: 600; color: var(--text-muted); }
    .modal-result-value { font-size: 16px; font-weight: 700; color: var(--text-color); }
    .modal-photo-previews { display: flex; gap: 10px; margin-bottom: 20px; }
    .modal-photo-preview { flex: 1; border: 1px solid var(--glass); border-radius: 10px; background-size: cover; background-position: center; min-height: 80px; }
    .close-modal { width: 100%; background: var(--glass); color: var(--text-color); border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 600; }

    .loading-overlay { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); backdrop-filter: blur(12px); flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
    .loading-overlay.show { display: flex; }
    .spinner { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--accent); border-radius: 50%; width: 50px; height: 50px; animation: spin 0.6s linear infinite; }
    .loading-overlay p { color: var(--text-color); font-weight: 600; font-size: 16px; margin: 0; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="container">
  <h1><span>🔥</span> 갓생챌린지 PRO</h1>
  <button class="noti-btn" onclick="requestNotification()"><i class="icon">🔔</i> 스마트폰 알림 권한 활성화 (필수)</button>
  <div id="habitContainer"></div>
</div>

<div id="resultModal" class="modal">
  <div class="modal-content">
    <h2 id="modalTitle">인증 결과 분석</h2>
    <div class="modal-photo-previews">
      <div id="modalExamplePhoto" class="modal-photo-preview" title="예시 사진"></div>
      <div id="modalResultPhoto" class="modal-photo-preview" title="촬영 사진"></div>
    </div>
    <div class="modal-result-data">
      <div class="modal-result-line"><span>유사도</span> <span id="modalSimilarity" class="modal-result-value">--%</span></div>
      <div class="modal-result-line"><span>불일치율</span> <span id="modalMismatch" class="modal-result-value">--%</span></div>
      <div class="modal-result-line"><span>분석 시간</span> <span id="modalAnalysisTime" class="modal-result-value">--초</span></div>
    </div>
    <p id="modalMessage" style="font-size: 14px; font-weight: 600; margin-bottom: 25px;"></p>
    <button class="close-modal" onclick="closeModal()">확인</button>
  </div>
</div>

<div id="loadingOverlay" class="loading-overlay">
  <div class="spinner"></div>
  <p id="loadingText">데이터 분석 중... ⚡</p>
</div>

<script>
  const habitIcons = ["📚", "🏃‍♂️", "✍️"];
  const fields = [
    { id: 'wWho', label: '누가', type: 'text', placeholder: '예: 내가' },
    { id: 'wWhen', label: '언제', type: 'time', placeholder: '' },
    { id: 'wWhere', label: '어디서', type: 'text', placeholder: '예: 책상에서' },
    { id: 'wWhat', label: '무엇을', type: 'text', placeholder: '예: 마케팅 책을' },
    { id: 'wHow', label: '어떻게', type: 'text', placeholder: '예: 30분 동안' },
    { id: 'wWhy', label: '왜', type: 'text', placeholder: '예: 성장하기 위해' }
  ];

  function requestNotification() {
    if (!("Notification" in window)) alert("이 브라우저는 알림을 지원하지 않습니다.");
    else if (Notification.permission === "granted") alert("이미 알림이 허용되어 있습니다!");
    else Notification.requestPermission().then(p => { if (p === "granted") alert("알림이 활성화되었습니다."); });
  }

  // 알람 로직
  setInterval(() => {
    const now = new Date();
    const currentStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
    const todayStr = now.toDateString();

    for (let i = 1; i <= 3; i++) {
      if (localStorage.getItem(`cat${i}_wWhen`) === currentStr && localStorage.getItem(`cat${i}_exampleImage`) && localStorage.getItem(`cat${i}_isSuccess`) !== 'true' && localStorage.getItem(`cat${i}_lastAlarmDate`) !== todayStr) {
        if (Notification.permission === "granted") new Notification("🔥 갓생챌린지 PRO", { body: `습관 분야 ${i} 실천 시간입니다!` });
        localStorage.setItem(`cat${i}_lastAlarmDate`, todayStr);
      }
    }
  }, 30000);

  // 💡 [핵심 해결책] 메모리 과부하 없는 초경량 이미지 압축 함수
  function ultraSafeCompress(file, callback) {
    if (!file) return;
    const objectUrl = URL.createObjectURL(file); // FileReader 대신 가벼운 URL 사용
    const img = new Image();
    
    img.onload = function() {
      URL.revokeObjectURL(objectUrl); // 메모리 즉시 정리
      try {
        const canvas = document.createElement('canvas');
        const MAX_WIDTH = 250;
        let width = img.width;
        let height = img.height;
        if (width > MAX_WIDTH) { height = Math.round(height * MAX_WIDTH / width); width = MAX_WIDTH; }
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        callback(canvas.toDataURL('image/jpeg', 0.5));
      } catch (err) {
        alert("브라우저 메모리 부족입니다. 사진 앱에서 용량을 줄이거나 다른 브라우저를 사용해주세요.");
      }
    };
    img.onerror = function() {
      alert("아이폰 HEIC 등 지원하지 않는 특수 포맷입니다. 카메라 설정을 '높은 호환성(JPEG)'으로 변경해주세요.");
    };
    img.src = objectUrl;
  }

  function openModal(title, similarity, mismatch, analysisTime, success, imgData) {
    const modal = document.getElementById('resultModal');
    document.getElementById('modalTitle').innerText = title;
    document.getElementById('modalExamplePhoto').style.backgroundImage = `url(${imgData.example})`;
    document.getElementById('modalResultPhoto').style.backgroundImage = `url(${imgData.captured})`;

    document.getElementById('modalSimilarity').innerText = `${similarity.toFixed(1)}%`;
    document.getElementById('modalMismatch').innerText = `${mismatch.toFixed(1)}%`;
    document.getElementById('modalAnalysisTime').innerText = `${(analysisTime / 1000).toFixed(2)}초`;

    const msgEl = document.getElementById('modalMessage');
    if (success) {
      modal.querySelector('.modal-content').style.borderColor = 'var(--success)';
      msgEl.innerText = "유사도 통과! 성공! 🎉";
      msgEl.style.color = "var(--success)";
    } else {
      modal.querySelector('.modal-content').style.borderColor = 'var(--warning)';
      msgEl.innerText = `유사도 미달. 다시 촬영해 주세요!`;
      msgEl.style.color = "var(--warning)";
    }
    modal.classList.add('show');
  }

  function closeModal() { document.getElementById('resultModal').classList.remove('show'); }
  function setPhotoBg(el, url) { el.style.backgroundImage = `url(${url})`; el.innerText = ''; }

  function renderHabits() {
    const container = document.getElementById('habitContainer');
    let html = '';
    for (let i = 1; i <= 3; i++) {
      let inputsHtml = fields.map(f => `<div class="input-group"><label>${f.label}</label><input type="${f.type}" id="cat${i}_${f.id}" placeholder="${f.placeholder}" oninput="checkConditions(${i})"></div>`).join('');
      html += `
        <div class="habit-section" id="section_${i}">
          <h2 class="habit-title"><i>${habitIcons[i-1]}</i> 습관 분야 ${i}</h2>
          <div class="card"><h3>📝 육하원칙 설정</h3>${inputsHtml}</div>
          <div class="card">
            <h3>🖼️ 사진 인증</h3>
            <div class="photo-container">
              <div id="cat${i}_examplePhoto" class="photo-box" onclick="document.getElementById('cat${i}_exampleInput').click()"><i>➕</i><br>예시 사진 등록</div>
              <div id="cat${i}_resultPhoto" class="photo-box result-box"><i>📷</i><br>대기 중</div>
            </div>
            <input type="file" id="cat${i}_exampleInput" accept="image/jpeg, image/png" onchange="loadExamplePhoto(event, ${i})">
            <input type="file" id="cat${i}_cameraInput" accept="image/jpeg, image/png" capture="environment" onchange="processVerification(event, ${i})">
          </div>
          <button id="cat${i}_practiceBtn" class="action-btn" onclick="document.getElementById('cat${i}_cameraInput').click()" disabled><i>⚡</i> 사진 촬영 및 인증</button>
        </div>`;
    }
    container.innerHTML = html;
  }

  window.onload = function() {
    renderHabits();
    const today = new Date().toDateString();
    if (localStorage.getItem('lastSavedDate') !== today) {
      localStorage.setItem('lastSavedDate', today);
      for(let i=1; i<=3; i++) {
        localStorage.removeItem(`cat${i}_isSuccess`); localStorage.removeItem(`cat${i}_resultImage`); localStorage.removeItem(`cat${i}_lastAlarmDate`);
        fields.forEach(f => localStorage.removeItem(`cat${i}_${f.id}`));
      }
    }
    for (let i = 1; i <= 3; i++) {
      fields.forEach(f => { const v = localStorage.getItem(`cat${i}_${f.id}`); if(v) document.getElementById(`cat${i}_${f.id}`).value = v; });
      const exImg = localStorage.getItem(`cat${i}_exampleImage`);
      if (exImg) setPhotoBg(document.getElementById(`cat${i}_examplePhoto`), exImg);
      if (localStorage.getItem(`cat${i}_isSuccess`) === 'true') {
        const resImg = localStorage.getItem(`cat${i}_resultImage`);
        if (resImg) setPhotoBg(document.getElementById(`cat${i}_resultPhoto`), resImg);
        setSuccessState(i);
      }
      checkConditions(i);
    }
  };

  function checkConditions(catId) {
    let allFilled = true;
    fields.forEach(f => {
      const el = document.getElementById(`cat${catId}_${f.id}`);
      localStorage.setItem(`cat${catId}_${f.id}`, el.value);
      if (el.value.trim() === '') allFilled = false;
    });
    const hasEx = localStorage.getItem(`cat${catId}_exampleImage`) !== null;
    const isSucc = localStorage.getItem(`cat${catId}_isSuccess`) === 'true';
    document.getElementById(`cat${catId}_practiceBtn`).disabled = !(allFilled && hasEx && !isSucc);
  }

  function loadExamplePhoto(event, catId) {
    const file = event.target.files[0];
    if (!file) return;
    ultraSafeCompress(file, function(imgUrl) {
      setPhotoBg(document.getElementById(`cat${catId}_examplePhoto`), imgUrl);
      localStorage.setItem(`cat${catId}_exampleImage`, imgUrl);
      checkConditions(catId);
    });
    event.target.value = '';
  }

  function processVerification(event, catId) {
    const file = event.target.files[0];
    if (!file) return;

    const overlay = document.getElementById('loadingOverlay');
    const btn = document.getElementById(`cat${catId}_practiceBtn`);
    const exampleImgUrl = localStorage.getItem(`cat${catId}_exampleImage`);

    if (!exampleImgUrl) { alert("예시 사진을 다시 등록해주세요!"); return; }

    overlay.classList.add('show');
    btn.innerText = "분석 중... ⚡";
    btn.disabled = true;

    // 3.5초 안전장치 
    const killSwitch = setTimeout(() => {
      overlay.classList.remove('show');
      alert("분석 시간이 초과되었습니다. 조금만 더 밝은 곳에서 찍어주세요.");
      btn.innerHTML = "<i>⚡</i> 사진 촬영 및 인증";
      btn.disabled = false;
    }, 3500);

    const startTime = performance.now();

    ultraSafeCompress(file, function(capturedImageUrl) {
      resemble(exampleImgUrl).compareTo(capturedImageUrl).ignoreColors().onComplete(function(data) {
        clearTimeout(killSwitch);
        const analysisTime = performance.now() - startTime;
        const similarity = 100 - data.mismatchPercentage;
        
        overlay.classList.remove('show');

        if (similarity >= 50) {
          openModal(`분야 ${catId}: 인증 성공`, similarity, data.mismatchPercentage, analysisTime, true, {example: exampleImgUrl, captured: capturedImageUrl});
          setPhotoBg(document.getElementById(`cat${catId}_resultPhoto`), capturedImageUrl);
          localStorage.setItem(`cat${catId}_resultImage`, capturedImageUrl);
          localStorage.setItem(`cat${catId}_isSuccess`, 'true');
          setSuccessState(catId);
        } else {
          openModal(`분야 ${catId}: 인증 실패`, similarity, data.mismatchPercentage, analysisTime, false, {example: exampleImgUrl, captured: capturedImageUrl});
          btn.innerHTML = "<i>⚡</i> 사진 촬영 및 인증";
          btn.disabled = false;
        }
      });
    });
    event.target.value = '';
  }

  function setSuccessState(catId) {
    const btn = document.getElementById(`cat${catId}_practiceBtn`);
    btn.innerText = "인증 완료 🎉";
    btn.classList.add('success');
    btn.disabled = true;
    fields.forEach(f => document.getElementById(`cat${catId}_${f.id}`).disabled = true);
  }
</script>

</body>
</html>
